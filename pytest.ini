[pytest]
# Тесты лежат в корне backend как *_test.py (progress_test.py, smoke_test.py).
# Каждый сам поднимает sqlite-in-memory и мокает транспорты/AI — внешних
# зависимостей и сети не требуют, запускаются офлайн.
testpaths = .
python_files = *_test.py test_*.py
python_functions = test_*
# Тесты используют asyncio.run() внутри обычных функций (не async-тесты),
# поэтому строгий режим pytest-asyncio просто не вмешивается.
asyncio_mode = strict
addopts = -q
# Чужие DeprecationWarning (pytest-asyncio/FastAPI on_event на Python 3.14)
# не относятся к нашему коду и только зашумляют вывод.
filterwarnings =
    ignore::DeprecationWarning:pytest_asyncio.*
    ignore:.*on_event is deprecated.*:DeprecationWarning
